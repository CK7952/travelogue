version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
    container_name: travelogue_backend_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - whisper_cache:/root/.cache
    networks:
      - travelogue

volumes:
  whisper_cache:

networks:
  travelogue:
    driver: bridge
