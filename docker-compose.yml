version: "3.8"

services:
  db:
    image: ankane/pgvector:latest
    container_name: travelogue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: travelogue
      POSTGRES_PASSWORD: travelogue
      POSTGRES_DB: travelogue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
